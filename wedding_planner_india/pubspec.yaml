name: wedding_planner_india
description: Complete Indian Wedding Operating System - Wedding Planner India
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  go_router: ^15.1.2
  get_it: ^8.0.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  drift: ^2.26.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.32
  path_provider: ^2.1.5
  path: ^1.9.1
  intl: ^0.20.2
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  uuid: ^4.5.1
  image_picker: ^1.1.2
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  connectivity_plus: ^6.1.4
  percent_indicator: ^4.2.4
  table_calendar: ^3.2.0
  dartz: ^0.10.1
  file_picker: ^8.3.7
  share_plus: ^10.1.4
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.0
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  geolocator: ^13.0.4
  url_launcher: ^6.3.1
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  drift_dev: ^2.26.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo/icon.png
  remove_alpha_ios: true
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/images/logo/icon.png
  web:
    generate: true
    image_path: assets/images/logo/icon.png
    background_color: "#000000"
    theme_color: "#000000"
  windows:
    generate: true
    image_path: assets/images/logo/icon.png

flutter_native_splash:
  color: "#000000"
  image: assets/images/logo/logo.png
  android_12:
    color: "#000000"
    image: assets/images/logo/logo.png

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/images/logo/
